[phases.install]
cmds = ["npm install --platform=linux --arch=x64", "node -e \"const fs=require('fs');const p='node_modules/@libsql/client/node_modules/libsql';try{fs.rmSync(p,{recursive:true})}catch(e){}fs.mkdirSync(p+'/lib-esm',{recursive:true});fs.writeFileSync(p+'/lib-esm/sqlite3.js','export default class Database{constructor(){}close(){}}');fs.writeFileSync(p+'/package.json',JSON.stringify({name:'libsql',version:'0.0.1',type:'module',exports:{'.':{'import':'./lib-esm/sqlite3.js'}}}));\""]

[start]
cmd = "node scripts/pipeline-worker.mjs --turso-sync"
